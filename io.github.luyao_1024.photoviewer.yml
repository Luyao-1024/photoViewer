app-id: io.github.luyao_1024.photoviewer
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: photo-viewer

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-run/gvfsd
  - --talk-name=org.gtk.vfs.*

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/man
  - /share/doc

modules:
  # ffmpeg 提供共享库（供 ffmpegthumbnailer 链接）+ ffprobe 二进制（供视频属性
  # 元数据提取）。默认内置 h264/hevc/vp9/av1 解码器，足够缩略图与探测；顶层
  # cleanup 会在所有模块构建完成后才清理 /include，故 ffmpegthumbnailer 仍能
  # 链接到 libav* 头文件。
  # 版本锁定 6.1.x：ffmpegthumbnailer 2.2.3 仍用 7.0 之前的 AVFrame 字段
  # (interlaced_frame/key_frame) 与 av_stream_get_side_data 旧签名，7.x/8.x 下
  # 编译失败。
  - name: ffmpeg
    config-opts:
      - --enable-shared
      - --disable-static
      - --enable-pic
      - --disable-doc
      - --disable-debug
      - --disable-programs
      - --enable-ffprobe
      - --disable-avdevice
      - --disable-network
      - --enable-gpl
      - --enable-version3
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-6.1.6.tar.xz
        sha256: d4fcb164028dd3beee5d92c0ac72e46aac6973c75ea12dc14de07bf8f407370a

  # ffmpegthumbnailer 生成视频封面帧，正确扩展 limited→full 色彩范围。
  # 依赖上面的 ffmpeg 库 + GNOME SDK 的 libpng/libjpeg/glib。
  - name: ffmpegthumbnailer
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DENABLE_GIO=ON
      - -DENABLE_THUMBNAILER=OFF
    sources:
      - type: archive
        url: https://github.com/dirkvdb/ffmpegthumbnailer/archive/refs/tags/2.2.3.tar.gz
        sha256: 8c9b9057c6cc8bce9d11701af224c8139c940f734c439a595525e073b09d19b8

  - name: photo-viewer
    buildsystem: simple
    build-options:
      env:
        PATH: /usr/lib/sdk/rust-stable/bin:/app/bin:/usr/bin
        CARGO_HOME: /run/build/photo-viewer/cargo-home
        CARGO_NET_OFFLINE: "true"
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/photo-viewer /app/bin/photo-viewer
      - install -Dm644 data/io.github.luyao_1024.photoviewer.desktop /app/share/applications/io.github.luyao_1024.photoviewer.desktop
      - install -Dm644 data/io.github.luyao_1024.photoviewer.metainfo.xml /app/share/metainfo/io.github.luyao_1024.photoviewer.metainfo.xml
      - install -Dm644 data/icons/photo-viewer-64.png /app/share/icons/hicolor/64x64/apps/io.github.luyao_1024.photoviewer.png
      - install -Dm644 data/icons/photo-viewer-128.png /app/share/icons/hicolor/128x128/apps/io.github.luyao_1024.photoviewer.png
      - install -Dm644 data/icons/photo-viewer-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.luyao_1024.photoviewer-symbolic.svg
    sources:
      - type: dir
        path: .
        skip:
          - .flatpak-builder
          - .git
          - .superpowers
          - .worktrees
          - build-flatpak
          - log
          - playwright-report
          - target
          - test-results
      - cargo-sources.json
